<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#141218"/>

  <!-- Boxes -->
  <rect x="50" y="150" width="150" height="80" rx="10" fill="#D0BCFF" stroke="#4F378B" stroke-width="2"/>
  <text x="125" y="195" font-family="Arial" font-size="14" text-anchor="middle" fill="#381E72">WebSocket Server</text>

  <rect x="300" y="150" width="150" height="80" rx="10" fill="#4F378B" stroke="#D0BCFF" stroke-width="2"/>
  <text x="375" y="195" font-family="Arial" font-size="14" text-anchor="middle" fill="#EADDFF">WebSocketManager</text>

  <rect x="550" y="150" width="150" height="80" rx="10" fill="#1D1B20" stroke="#D0BCFF" stroke-width="2"/>
  <text x="625" y="195" font-family="Arial" font-size="14" text-anchor="middle" fill="#E6E1E5">Room DB (SSOT)</text>

  <rect x="550" y="20" width="150" height="80" rx="10" fill="#D0BCFF" stroke="#4F378B" stroke-width="2"/>
  <text x="625" y="65" font-family="Arial" font-size="14" text-anchor="middle" fill="#381E72">Jetpack Compose UI</text>

  <!-- Arrows -->
  <line x1="200" y1="190" x2="290" y2="190" stroke="#CAC4D0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="190" x2="540" y2="190" stroke="#CAC4D0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="625" y1="150" x2="625" y2="110" stroke="#7FC4FD" stroke-width="3" marker-end="url(#arrowhead)"/>

  <text x="245" y="180" font-family="Arial" font-size="12" text-anchor="middle" fill="#CAC4D0">JSON Payload</text>
  <text x="495" y="180" font-family="Arial" font-size="12" text-anchor="middle" fill="#CAC4D0">DAO Update</text>
  <text x="680" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="#7FC4FD">Flow/StateFlow</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CAC4D0" />
    </marker>
  </defs>
</svg>
